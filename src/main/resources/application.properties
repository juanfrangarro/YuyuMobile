# ==========================================================================
# SPRING APPLICATION CONFIGURATION - LUXURY PHONE PLATFORM
# ==========================================================================

spring.application.name=yuyumobile-luxury
server.port=8080

# --- Relational Datasource: In-memory H2 Database for Development ---
spring.datasource.url=jdbc:h2:mem:luxurydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA / Hibernate dialect parameters ---
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Visual H2 Console Console ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
# Fixes console iframe headers issues on standard browsers
spring.headers.frame-options=sameorigin

# --- Stripe Payments API Coordinates ---
# Swap these with production keys (e.g. sk_live_... / whsec_...) in environment configs
stripe.api.key=stripe_api_key_placeholder
stripe.webhook.secret=stripe_webhook_secret_placeholder
